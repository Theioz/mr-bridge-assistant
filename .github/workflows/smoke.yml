name: Smoke

on:
  pull_request:
    paths:
      - 'web/**'
      - 'docs/smoke-testing.md'
      - '.github/workflows/smoke.yml'
      - '.mcp.json'
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC daily
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    env:
      SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      SMOKE_SUPABASE_SERVICE_KEY: ${{ secrets.SMOKE_SUPABASE_SERVICE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium (cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run smoke:chat

      - run: npm run smoke:a11y

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-pr-artifacts
          path: |
            web/smoke/test-results/
            web/smoke/playwright-report/
          retention-days: 14

  smoke-release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web
    env:
      SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      SMOKE_SUPABASE_SERVICE_KEY: ${{ secrets.SMOKE_SUPABASE_SERVICE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium (cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Chat + a11y smokes (against next dev)
        run: |
          npm run smoke:chat
          npm run smoke:a11y

      - name: Stop any leftover dev server
        run: pkill -f 'next dev' || true

      - name: Build prod bundle
        run: npm run build

      - name: Start next start
        run: |
          npm run start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://localhost:3000/login || true)
            if [ "$code" = "200" ]; then
              echo "next start ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "next start never became ready" >&2
          cat /tmp/next-start.log >&2
          exit 1

      - name: Perf smoke (against next start)
        run: npm run smoke:perf

      - name: Stop next start
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill "$(cat /tmp/next-start.pid)" 2>/dev/null || true
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-release-artifacts
          path: |
            web/smoke/test-results/
            web/smoke/playwright-report/
            web/smoke/perf-report/
          retention-days: 14
