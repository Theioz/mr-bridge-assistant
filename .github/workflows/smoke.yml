# smoke — PARKED 2026-07-13 (#476).
#
# These tests cannot run on a GitHub-hosted runner any more, and no amount of
# editing the specs fixes that: the app and Supabase are now **tailnet-only**
# (mr-bridge.jl-infra-lab.com / supabase.jl-infra-lab.com). A cloud runner has no
# route to either, so every spec would fail at login.
#
# Re-enabling means one of:
#   - a self-hosted runner on the tailnet, or
#   - standing up a throwaway Supabase + app in the job itself
#
# Parked rather than deleted: the specs are still valuable and the auth/export/a11y
# ones are not chat-dependent. The chat specs ARE gone (the chat was deleted) —
# chat.spec.ts, chat-multi-turn-smoke.spec.ts, tool-status-feedback.spec.ts.
#
# Trigger is workflow_dispatch-only so it never runs (and never fails) by accident.

name: Smoke

on:
  # Manual only — see the header. Cloud runners cannot reach the tailnet.
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # smoke-pr-chat: REMOVED — the in-app chat was deleted (#476). Conversation now
  # happens through the MCP server (web/mcp/), which is not a browser surface and
  # is not smoke-testable with Playwright.
  smoke-pr-a11y:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # Smoke-only vars (fixture + supabase-verify admin client)
      SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      SMOKE_SUPABASE_SERVICE_KEY: ${{ secrets.SMOKE_SUPABASE_SERVICE_KEY }}
      # Next app runtime (middleware, server components, API routes).
      # SUPABASE_SERVICE_ROLE_KEY aliases SMOKE_SUPABASE_SERVICE_KEY per
      # docs/smoke-testing.md §2 — one secret covers both names.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SMOKE_SUPABASE_SERVICE_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium (cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run smoke:a11y

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-pr-a11y-artifacts
          path: |
            web/smoke/test-results/
            web/smoke/playwright-report/
          retention-days: 14

  smoke-release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      SMOKE_SUPABASE_SERVICE_KEY: ${{ secrets.SMOKE_SUPABASE_SERVICE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SMOKE_SUPABASE_SERVICE_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium (cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Chat + a11y smokes (against next dev)
        run: |
          npm run smoke:a11y

      - name: Stop any leftover dev server
        run: pkill -f 'next dev' || true

      - name: Build prod bundle
        run: npm run build

      - name: Start next start
        run: |
          npm run start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://localhost:3000/login || true)
            if [ "$code" = "200" ]; then
              echo "next start ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "next start never became ready" >&2
          cat /tmp/next-start.log >&2
          exit 1

      - name: Perf smoke (against next start)
        run: npm run smoke:perf

      - name: Stop next start
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill "$(cat /tmp/next-start.pid)" 2>/dev/null || true
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-release-artifacts
          path: |
            web/smoke/test-results/
            web/smoke/playwright-report/
            web/smoke/perf-report/
          retention-days: 14
